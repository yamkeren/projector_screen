; PlatformIO Project Configuration File
; Industrial Rolling Projector Screen Controller
; Target: ESP32 + BTS7960 H-Bridge

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_ESP32_DEV
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -Isrc
    -Isrc/core
    -Isrc/motion
    -Isrc/safety
    -Isrc/network
    -Isrc/power
    -Isrc/storage
    -Isrc/app
    -Isrc/audio

build_unflags = -std=gnu++11

lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/mathieucarbou/AsyncTCP.git
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    https://github.com/tzapu/WiFiManager.git
    ayushsharma82/ElegantOTA@^3.1.0

; --- PID Unit Tests: pio run -e pid_unit_test / pio run -e pid_unit_test -t upload
[env:pid_unit_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -Isrc
    -Isrc/core
    -Isrc/motion
build_unflags = -std=gnu++11
build_src_filter =
    -<*>
    +<motion/encoder.cpp>
    +<../test/pid_unit_test.cpp>

